services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai_institution_os_postgres
    environment:
      POSTGRES_USER: ai_os
      POSTGRES_PASSWORD: ai_os
      POSTGRES_DB: ai_os
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_os -d ai_os"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

